<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 52" width="210" height="52">
  <defs>
    <style>
      .logo-text {
        font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 700;
        font-size: 30px;
        font-style: italic;
        letter-spacing: -0.04em;
        fill: #fe66c4;
      }
      .logo-subtext {
        font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 700;
        font-size: 5.5px;
        fill: #ffffff;
        letter-spacing: 0.15em;
      }
      .washer-drum {
        animation: washCycle 8s ease-in-out infinite;
        transform-origin: 29px 52px;
      }
      @keyframes washCycle {
        0%, 100% { transform: rotate(0deg); }
        40% { transform: rotate(360deg); }
        50% { transform: rotate(360deg); }
        90% { transform: rotate(-360deg); }
      }
    </style>
  </defs>

  <!-- Washing Machine Graphic scaled to 38px width, 40px height -->
  <g transform="translate(0, 2) scale(0.5)">
    <!-- Bubbles -->
    <circle cx="15" cy="15" r="5" fill="#8ECAFD" opacity="0.8"/>
    <circle cx="28" cy="10" r="3" fill="#8ECAFD" opacity="0.6"/>
    <circle cx="8" cy="20" r="2" fill="#8ECAFD" opacity="0.7"/>
    <!-- Washing Machine Body -->
    <rect x="5" y="22" width="48" height="52" rx="8" fill="#FFFFFF" stroke="#041D40" stroke-width="2"/>
    <!-- Control Panel Line -->
    <line x1="9" y1="32" x2="49" y2="32" stroke="#041D40" stroke-width="2"/>
    <circle cx="14" cy="27" r="2" fill="#041D40"/>
    <circle cx="20" cy="27" r="2" fill="#041D40"/>
    <!-- Washing Machine Door -->
    <circle cx="29" cy="52" r="15" fill="#FFFFFF" stroke="#041D40" stroke-width="2.5"/>
    <circle cx="29" cy="52" r="10" fill="none" stroke="#8ECAFD" stroke-width="2" stroke-dasharray="3 2" class="washer-drum"/>
    
    <!-- Folded Towels Stack on Right -->
    <path d="M48 54 h18 c2 0, 3 1.5, 3 3 s-1 3, -3 3 h-18 Z" fill="#FFFFFF" stroke="#041D40" stroke-width="1.5"/>
    <path d="M46 61 h20 c2 0, 3 1.5, 3 3 s-1 3, -3 3 h-46 Z" fill="#FFFFFF" stroke="#041D40" stroke-width="1.5"/>
    <path d="M44 68 h22 c2 0, 3 1.5, 3 3 s-1 3, -3 3 h-22 Z" fill="#FFFFFF" stroke="#041D40" stroke-width="1.5"/>
  </g>

  <!-- Logo Text with shadow -->
  <g transform="translate(42, 33)">
    <!-- shadow -->
    <text x="2" y="2" fill="#8ECAFD" class="logo-text">nicefold</text>
    <!-- main text -->
    <text x="0" y="0" class="logo-text">nicefold</text>
  </g>

  <!-- Logo Subtext -->
  <text x="44" y="47" class="logo-subtext">CRISPEST FOLD GUARANTEED</text>
</svg>
